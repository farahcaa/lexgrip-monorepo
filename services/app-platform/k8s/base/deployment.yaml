apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      component: app-platform
  template:
    metadata:
      labels:
        component: app-platform
    spec:
      containers:
        - name: app-platform
          image: localhost/farakov-engineering/app-platform:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
      initContainers:
        - name: wait-for-keycloak
          image: busybox:1.37
          command:
            - sh
            - -c
            - |
              echo "Waiting for Keycloak..."
              until wget -qO- http://keycloak-service/realms/master; do
                echo "Keycloak not ready yet..."
                sleep 3
              done
              echo "Keycloak is ready!"
