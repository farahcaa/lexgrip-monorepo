apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment
spec:
  template:
    spec:
      containers:
        - name: keycloak
          volumeMounts:
            - name: realm
              mountPath: /opt/keycloak/realms/
              readOnly: true
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: data
              mountPath: /opt/keycloak/data
            - name: providers
              mountPath: /opt/keycloak/providers
      volumes:
        - name: realm
          configMap:
            name: realm
        - name: scripts
          configMap:
            name: scripts
        - name: data
          persistentVolumeClaim:
            claimName: pvc
        - name: providers
          emptyDir: {}