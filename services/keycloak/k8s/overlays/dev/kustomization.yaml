apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base
  - ingressroute.yaml
  - secret.yaml

configMapGenerator:
  - name: scripts
    files:
      - start-keycloak.sh
  - name: env
    behavior: merge
    envs:
      - keycloak.env
  - name: realm
    files:
      - master-realm.json

generatorOptions:
  disableNameSuffixHash: true